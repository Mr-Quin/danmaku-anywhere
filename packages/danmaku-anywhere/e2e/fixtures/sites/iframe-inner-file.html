<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DA Harness - iframe inner (local file)</title>
    <style>
      html,
      body {
        margin: 0;
        background: #000;
      }
      video {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <video
      data-testid="da-video"
      src="/media/sample-motion.webm"
      autoplay
      muted
      loop
      playsinline
      controls
    ></video>
  </body>
</html>
