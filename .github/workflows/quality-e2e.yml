name: PR E2E Quality

on:
  pull_request:
    paths:
      - 'packages/danmaku-anywhere/**'
      - 'packages/danmaku-converter/**'
      - 'packages/danmaku-engine/**'
      - 'packages/danmaku-provider/**'
      - 'packages/dango/**'
      - 'packages/dango-manifests/**'
      - 'packages/integration-policy/**'
      - 'packages/result/**'
      - 'packages/web-scraper/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/quality-e2e.yml'

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache built workspace packages
        uses: actions/cache@v4
        with:
          path: packages/*/dist
          key: built-packages-${{ runner.os }}-${{ hashFiles('packages/*/src/**', 'packages/*/package.json', 'packages/*/tsconfig*.json', 'tsconfig.base.json', 'tsconfig.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            built-packages-${{ runner.os }}-

      - name: Build packages
        run: pnpm build:packages

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Hash the lockfile so transitive Playwright version bumps
          # invalidate the cache.
          key: ${{ runner.os }}-playwright-${{ hashFiles('packages/danmaku-anywhere/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        working-directory: packages/danmaku-anywhere
        run: pnpm exec playwright install --with-deps chromium

      # .env is gitignored, so write a synthetic one for the build. The
      # hosts are intercepted by Playwright routes; nothing reaches them.
      - name: Write .env for build
        working-directory: packages/danmaku-anywhere
        run: |
          cat > .env <<'EOF'
          VITE_PROXY_URL=https://api.danmaku.test
          VITE_PROXY_ORIGIN=https://danmaku.test
          EOF

      - name: Build extension (e2e — dev API on, open shadow root)
        working-directory: packages/danmaku-anywhere
        env:
          VITE_DA_ENV: e2e
        run: pnpm build

      - name: Run E2E tests
        working-directory: packages/danmaku-anywhere
        # MV3 extensions need headed Chromium; xvfb provides a display.
        run: xvfb-run --auto-servernum pnpm test:e2e
        env:
          PLAYWRIGHT_HEADED: '1'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/danmaku-anywhere/playwright-report/
          retention-days: 7

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: packages/danmaku-anywhere/test-results/
          retention-days: 7

  prod-build-dce-guard:
    name: Verify dev API is stripped from prod build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache built workspace packages
        uses: actions/cache@v4
        with:
          path: packages/*/dist
          key: built-packages-${{ runner.os }}-${{ hashFiles('packages/*/src/**', 'packages/*/package.json', 'packages/*/tsconfig*.json', 'tsconfig.base.json', 'tsconfig.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            built-packages-${{ runner.os }}-

      - name: Build packages
        run: pnpm build:packages

      - name: Build extension (prod)
        working-directory: packages/danmaku-anywhere
        env:
          VITE_DA_ENV: prod
        run: pnpm build

      - name: Assert dev API is not in the prod bundle
        working-directory: packages/danmaku-anywhere
        # These strings only exist in src/devApi implementation files, not
        # in src/devApi/index.prod.ts. A match means DCE failed.
        run: |
          if grep -rE "DevApiError|Unknown dev API|Read/write provider configs|Service worker lifecycle and metadata" build/ ; then
            echo "::error::Dev API implementation leaked into prod build (DCE guard failed)"
            exit 1
          fi
