<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Danmaku Anywhere</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      color: #333;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 48px 40px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
      text-align: center;
    }
    .subtitle {
      font-size: 14px;
      color: #666;
      text-align: center;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus {
      border-color: #1976d2;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #1565c0; }
    button:disabled {
      background: #bbb;
      cursor: not-allowed;
    }
    .message {
      margin-top: 16px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      display: none;
    }
    .message.error {
      display: block;
      background: #fdecea;
      color: #c62828;
    }
    .message.success {
      display: block;
      background: #e8f5e9;
      color: #2e7d32;
    }
    .invalid {
      text-align: center;
      font-size: 15px;
      color: #666;
      line-height: 1.5;
    }
    .invalid-icon {
      font-size: 48px;
      margin-bottom: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card" id="card"></div>
  <script>
    (function() {
      var card = document.getElementById('card');
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token');

      if (!token) {
        card.innerHTML =
          '<div class="invalid-icon">&#9888;</div>' +
          '<p class="invalid">This password reset link is invalid or has expired.</p>';
        return;
      }

      card.innerHTML =
        '<h1>Reset Password</h1>' +
        '<p class="subtitle">Enter your new password below.</p>' +
        '<form id="form">' +
          '<label for="password">New password</label>' +
          '<input type="password" id="password" name="password" required minlength="6" autocomplete="new-password">' +
          '<label for="confirm">Confirm password</label>' +
          '<input type="password" id="confirm" name="confirm" required minlength="6" autocomplete="new-password">' +
          '<button type="submit" id="submit">Reset Password</button>' +
        '</form>' +
        '<div class="message" id="message"></div>';

      var form = document.getElementById('form');
      var msg = document.getElementById('message');
      var btn = document.getElementById('submit');

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        var pw = document.getElementById('password').value;
        var confirm = document.getElementById('confirm').value;

        msg.className = 'message';
        msg.style.display = 'none';

        if (pw !== confirm) {
          msg.className = 'message error';
          msg.textContent = 'Passwords do not match.';
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Resetting\u2026';

        fetch('/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ newPassword: pw, token: token })
        })
        .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
        .then(function(result) {
          if (result.ok) {
            msg.className = 'message success';
            msg.textContent = 'Password reset successfully. You can close this page and sign in with your new password.';
            form.style.display = 'none';
          } else {
            msg.className = 'message error';
            msg.textContent = result.data.message || 'Failed to reset password. The link may have expired.';
            btn.disabled = false;
            btn.textContent = 'Reset Password';
          }
        })
        .catch(function() {
          msg.className = 'message error';
          msg.textContent = 'Something went wrong. Please try again.';
          btn.disabled = false;
          btn.textContent = 'Reset Password';
        });
      });
    })();
  </script>
</body>
</html>
